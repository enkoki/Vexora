<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link rel="stylesheet" href="../../global.css" />
		<title>Vexora - Start Shopping Today</title>
		<link rel="shortcut icon" href="../../favicon.png" type="image/x-icon" />
	</head>
	<body>
		<div
			class="bg-(--button) h-12 text-[14px] flex w-full justify-center items-center"
		>
			<span class="text-(--text)">
				Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%!
				<span
					class="font-semibold leading-6 underline cursor-pointer"
					onclick="window.location.href = '/login'"
					>SHOP NOW</span
				></span
			>
		</div>
		<header
			class="z-50 bg-(--primary) sticky top-0 flex justify-between items-center px-[8.438rem] pt-5 mt-5 w-full border-b-[0.5px] border-(--button)/30 pb-4"
		>
			<div class="flex justify-between items-center gap-[11.875rem]">
				<span class="text-(--text2) text-2xl font-bold text-center">
					Vexora
				</span>
				<nav>
					<ul
						class="flex justify-center items-center gap-12 text-(--text2) text-[16px]"
					>
						<li><a href="../../index.html">Home</a></li>
						<li
							class="hover:scale-[101%] hover:-translate-y-1 transition-all duration-200"
						>
							<a>Shop</a>
						</li>
						<li
							class="hover:scale-[101%] hover:-translate-y-1 transition-all duration-200"
						>
							<a>About</a>
						</li>
						<li
							class="hover:scale-[101%] hover:-translate-y-1 transition-all duration-200"
						>
							<a>Sign Up</a>
						</li>
					</ul>
				</nav>
			</div>
			<div class="flex gap-6 w-max justify-center items-center">
				<div
					class="bg-(--secondary) w-[15.188rem] h-[2.375rem] rounded-[4px] relative"
				>
					<input
						type="search"
						placeholder="What are you looking for?"
						class="w-full h-full pl-5 p-2 outline-none placeholder:text-xs text-sm"
					/>
					<svg
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						xmlns="http://www.w3.org/2000/svg"
						class="absolute top-1.5 right-2"
					>
						<path
							d="M20 20L16.2223 16.2156M18.3158 11.1579C18.3158 13.0563 17.5617 14.8769 16.2193 16.2193C14.8769 17.5617 13.0563 18.3158 11.1579 18.3158C9.2595 18.3158 7.43886 17.5617 6.0965 16.2193C4.75413 14.8769 4 13.0563 4 11.1579C4 9.2595 4.75413 7.43886 6.0965 6.0965C7.43886 4.75413 9.2595 4 11.1579 4C13.0563 4 14.8769 4.75413 16.2193 6.0965C17.5617 7.43886 18.3158 9.2595 18.3158 11.1579V11.1579Z"
							stroke="black"
							stroke-width="1.5"
							stroke-linecap="round"
						/>
					</svg>
				</div>
				</div>
			</div>
		</header>
		<main class="pt-[60px] flex w-full">
			<div class="w-[1800px] h-[781px]">
				<img
					src="../../assets/images/SideImage.png"
					alt="side image"
					class="w-full h-full"
				/>
			</div>
			<div class="flex justify-center items-center flex-col w-full gap-12">
				<div class="flex flex-col justify-center items-start gap-6">
					<h1 class="text-[36px] font-medium tracking-wide leading-[30px]">
						Log in to Vexora
					</h1>
					<p class="text-base leading-[24px]">Enter your details below</p>
				</div>
				<div>
					<form
						id="loginForm"
						class="flex flex-col justify-center items-center gap-6"
					>
						<div class="w-full">
							<input
								id="emailOrPhone"
								type="text"
								placeholder="Email or Phone Number"
								class="input outline-none pb-2 border-b-2 border-(--text2)/50 placeholder:text-(--text2)/40 w-full"
							/>
							<p id="emailError" class="text-red-500 text-sm mt-1 hidden"></p>
						</div>

						<div class="w-full">
							<input
								id="password"
								type="password"
								placeholder="Password"
								class="input outline-none pb-2 border-b-2 border-(--text2)/50 placeholder:text-(--text2)/40 w-full"
							/>
							<p
								id="passwordError"
								class="text-red-500 text-sm mt-1 hidden"
							></p>
						</div>

						<div class="flex justify-between items-center w-full">
							<button
								id="loginBtn"
								type="submit"
								class="cursor-pointer bg-(--button2) px-12 py-4 text-(--text) font-medium rounded-[4px]"
							>
								Log In
							</button>
							<span class="cursor-pointer text-(--secondary2)"
								>Forgot Password?</span
							>
						</div>
					</form>
				</div>
			</div>
		</main>
		<script src="validation.js"></script>
	</body>
</html>
